<!DOCTYPE html>
<html>
<head>

      cursor:pointer;
    }

<body>

    <button onclick="goBack()">⬅ Back</button>

<script>
function goBack(){

}

<div class="box">

<h2>📲 Contact Support</h2>

<button onclick="chat()">Chat on WhatsApp</button>

</div>

<script>
function chat(){
  const num="94771945590";
  const msg="Hi Bro";

  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
